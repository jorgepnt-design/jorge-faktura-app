<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jorge Faktura App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: #2c3e50;
      color: white;
      padding: 16px 24px;
    }
    header h1 { font-size: 1.2rem; }

    .container { max-width: 700px; margin: 60px auto; padding: 0 16px; text-align: center; }
    .hero { font-size: 1.8rem; font-weight: bold; margin-bottom: 12px; }
    .sub  { color: #666; margin-bottom: 40px; }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 28px 32px;
      width: 200px;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
    .card .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .card .label { font-weight: bold; font-size: 1rem; }
    .card .desc  { font-size: 0.82rem; color: #888; margin-top: 6px; }
  </style>
</head>
<body>

<header>
  <h1>Jorge Faktura App</h1>
</header>

<div class="container">
  <div class="hero">Willkommen</div>
  <div class="sub">Verwalte deine Rechnungen einfach und schnell.</div>

  <div class="cards">
    <a class="card" href="verlauf.html">
      <div class="icon">📋</div>
      <div class="label">Verlauf</div>
      <div class="desc">Alle bisherigen Rechnungen anzeigen</div>
    </a>
    <a class="card" href="#">
      <div class="icon">➕</div>
      <div class="label">Neue Rechnung</div>
      <div class="desc">Rechnung erstellen und versenden</div>
    </a>
    <a class="card" href="#">
      <div class="icon">⚙️</div>
      <div class="label">Einstellungen</div>
      <div class="desc">Profil und Präferenzen</div>
    </a>
  </div>
</div>

</body>
</html>
